"type: docs":
  - changed-files:
      - any-glob-to-any-file:
          - "docs/**"
          - "*.md"
          - "**/*.md"

"type: test":
  - changed-files:
      - any-glob-to-any-file:
          - "tests/**"

"type: ci":
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
          - "Dockerfile"
          - "docker-compose.yml"
          - "Makefile"

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "frontend/**"
          - "dashboard/**"

backend:
  - changed-files:
      - any-glob-to-any-file:
          - "*.py"
          - "**/*.py"
          - "requirements*.txt"
