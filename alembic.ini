# alembic.ini — Alembic configuration for the hivemind platform persistence layer.
#
# DATABASE_URL resolution:
#   - The `sqlalchemy.url` key below is used as a fallback if the
#     DATABASE_URL environment variable is not set.
#   - In env.py, we override this value with the resolved async URL so that
#     both SQLite (dev) and PostgreSQL (prod) work transparently.
#
# Usage:
#   alembic upgrade head          # apply all migrations
#   alembic downgrade -1          # roll back one migration
#   alembic revision --autogenerate -m "describe change"   # generate new migration

[alembic]
# Path to migration scripts directory (relative to this file)
script_location = src/db/migrations

# Jinja2 template for new migration files
# file_template = %%(rev)s_%%(slug)s

# SQLAlchemy URL — overridden at runtime by env.py via DATABASE_URL env var.
# This is the SQLite dev fallback; do NOT commit real credentials here.
sqlalchemy.url = sqlite+aiosqlite:///data/platform.db

# Prepend sys.path so src/ is importable
prepend_sys_path = .

# Timezone for migration timestamps (UTC)
timezone = UTC

# Max width of auto-generated SQL in migration scripts
output_encoding = utf-8

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
